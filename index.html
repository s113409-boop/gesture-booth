<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI 手勢四格拍貼機</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="app">
    <header class="hero">
      <p class="eyebrow">AI GESTURE PHOTOBOOTH</p>
      <h1>AI 手勢四格拍貼機</h1>
      <p class="subtitle">
        比 1 / 2 / 3 / 4 根手指依序拍照，拍完後再選濾鏡、特效、相框。
      </p>
    </header>

    <section class="camera-card">
      <video id="video" autoplay playsinline muted></video>
      <div id="flash" class="flash"></div>
      <div id="countdown" class="countdown"></div>
    </section>

    <p id="status" class="status">請按下「開啟相機」</p>
    <p id="gestureText" class="gesture">目前手勢：尚未偵測</p>

    <div class="buttons">
      <button id="startBtn">開啟相機</button>
      <button id="resetBtn">重新拍攝</button>
      <button id="flashBtn">閃光燈：開</button>
      <button id="downloadBtn">下載照片</button>
    </div>

    <section class="editor">
      <h2>照片編輯</h2>
      <div class="control-group">
        <h3>濾鏡</h3>
        <div id="filterControls" class="option-row"></div>
      </div>
      <div class="control-group">
        <h3>特效</h3>
        <div id="effectControls" class="option-row"></div>
      </div>
      <div class="control-group">
        <h3>相框樣式</h3>
        <div id="frameControls" class="option-row"></div>
      </div>
    </section>

    <section class="preview">
      <h2>成品預覽</h2>
      <canvas id="resultCanvas"></canvas>
    </section>
  </main>

  <script type="module" src="script.js"></script>
</body>
</html>
